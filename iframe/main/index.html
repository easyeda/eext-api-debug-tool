<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<title>Ace Editor - EDA V2.6.5</title>
		<link rel="stylesheet" href="/iframe/style/theme-vars.css" />
		<link rel="stylesheet" href="/iframe/style/theme-base.css" />
		<link rel="stylesheet" href="/iframe/style/file-tree.css" />
		<link rel="stylesheet" href="/iframe/style/left-nav.css" />
		<link rel="stylesheet" href="/iframe/script/SweetAlert2/sweetalert2.min.css" />
	</head>
	<body>
		<div
			id="loading-overlay"
			style="
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: var(--eext-bg-body);
				z-index: 99999;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				font-family: var(--eext-font-family);
				color: var(--eext-text-primary);
			"
		>
			<div style="font-size: 14px; margin-bottom: 12px">正在加载编辑器...</div>
			<div style="width: 120px; height: 3px; background: var(--eext-border); border-radius: 2px; overflow: hidden">
				<div
					id="loading-bar"
					style="height: 100%; width: 0; background: var(--eext-brand); border-radius: 2px; transition: width 0.3s ease"
				></div>
			</div>
		</div>
		<div id="app">
			<!-- 顶部工具栏 -->
			<div id="toolbar">
				<button id="run-btn">运行</button>
				<button id="file-btn">文件</button>
				<button id="settings-btn">设置</button>
				<ul id="quick-btn-list"></ul>
				<button id="ai-btn" style="margin-left: auto">Copilot</button>
			</div>
			<!-- 标签栏 -->
			<div id="tab-bar"></div>
			<!-- 主内容区 -->
			<div id="main-content">
				<!-- 左侧导航面板 -->
				<div id="left-nav-panel">
					<button class="nav-button active" id="nav-all-projects" title="所有项目">所有项目</button>
					<button class="nav-button" id="nav-project-design" title="项目设计">项目设计</button>
					<button class="nav-button" id="nav-common-code" title="常用代码">常用代码</button>
				</div>
				<!-- 左侧内容区域 -->
				<div id="left-content-area">
					<!-- 项目列表视图 -->
					<div id="project-list-view" style="display: flex">
						<div class="project-list-header">
							<input type="text" class="project-search-box" id="project-search-input" placeholder="搜索项目..." />
							<button class="import-project-btn" id="import-project-btn" title="导入项目">导入</button>
						</div>
						<div class="project-list-content" id="project-list-content"></div>
					</div>
					<!-- 文件树视图 -->
					<div id="file-tree" style="display: none"></div>
					<!-- 补全仓库视图 -->
					<div id="completer-store-view" style="display: none">
						<div class="completer-list-header">
							<div class="completer-header-title">常用代码</div>
							<input type="text" class="completer-search-box" id="completer-search-input" placeholder="搜索代码..." />
						</div>
						<div class="completer-list-content" id="completer-list-content"></div>
					</div>
				</div>
				<!-- 编辑器容器 -->
				<div id="editor-container">
					<div id="editor"></div>
					<!-- HTML 预览容器 -->
					<div id="html-preview-container">
						<iframe id="html-preview-frame"></iframe>
					</div>
				</div>
				<!-- 右侧 AI 聊天窗口 -->
				<div id="ai-chat" style="display: none">
					<div class="ai-chat-header">
						<span class="ai-chat-title" id="ai-model-name">GPT-4 Model</span>
						<button class="ai-chat-new-conversation-btn" id="ai-new-conversation-btn" title="新建对话">
							<svg
								xmlns="http://www.w3.org/2000/svg"
								width="18"
								height="18"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<path d="M12 5v14M5 12h14"></path>
							</svg>
						</button>
						<button class="ai-chat-settings-btn" id="ai-settings-trigger" title="聊天设置">
							<svg
								xmlns="http://www.w3.org/2000/svg"
								width="18"
								height="18"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<circle cx="12" cy="12" r="3"></circle>
								<path
									d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
								></path>
							</svg>
						</button>
					</div>
					<div class="ai-chat-content" id="ai-chat-list">
						<div class="ai-message ai-message-system">
							<div class="ai-message-bubble">你好！我是你的 AI 编程助手。有什么可以帮你的吗？</div>
						</div>
					</div>
					<div class="ai-chat-footer">
						<textarea id="ai-input" placeholder="输入代码问题或指令... (Shift+Enter 换行)" rows="1"></textarea>
						<button id="ai-send-btn">发送</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Ace 核心 -->
		<script src="/iframe/script/Ace_Editor/ace.js"></script>
		<script src="/iframe/script/Ace_Editor/ext-language_tools.js"></script>
		<script src="/iframe/script/Ace_Editor/mode-javascript.js"></script>
		<script src="/iframe/script/Ace_Editor/mode-html.js"></script>
		<script src="/iframe/script/Ace_Editor/mode-css.js"></script>
		<script src="/iframe/script/Ace_Editor/mode-json.js"></script>
		<script src="/iframe/script/Ace_Editor/mode-xml.js"></script>
		<script src="/iframe/script/Ace_Editor/mode-markdown.js"></script>
		<script src="/iframe/script/Ace_Editor/mode-typescript.js"></script>
		<script src="/iframe/script/Ace_Editor/mode-text.js"></script>
		<script src="/iframe/script/Ace_Editor/ext-searchbox.js"></script>
		<script src="/iframe/script/Ace_Editor/ext-options.js"></script>
		<script src="/iframe/script/Ace_Editor/ext-modelist.js"></script>
		<script src="/iframe/script/Ace_Editor/ext-themelist.js"></script>
		<script src="/iframe/script/Ace_Editor/ext-settings_menu.js"></script>
		<script src="/iframe/script/Ace_Editor/ext-prompt.js"></script>
		<!-- Ace 主题 -->
		<script src="/iframe/script/Ace_Editor/theme-monokai.js"></script>
		<script src="/iframe/script/Ace_Editor/theme-github.js"></script>
		<script src="/iframe/script/Ace_Editor/theme-ambiance.js"></script>
		<script src="/iframe/script/Ace_Editor/theme-chaos.js"></script>
		<script src="/iframe/script/Ace_Editor/theme-chrome.js"></script>
		<script src="/iframe/script/Ace_Editor/theme-clouds.js"></script>
		<script src="/iframe/script/Ace_Editor/theme-clouds_midnight.js"></script>
		<script src="/iframe/script/Ace_Editor/theme-cobalt.js"></script>
		<script src="/iframe/script/Ace_Editor/theme-crimson_editor.js"></script>
		<script src="/iframe/script/Ace_Editor/theme-dreamweaver.js"></script>
		<!-- 代码格式化 -->
		<script src="/iframe/script/Js_beautify/beautify.min.js"></script>
		<script src="/iframe/script/Js_beautify/beautify-css.min.js"></script>
		<script src="/iframe/script/Js_beautify/beautify-html.min.js"></script>
		<!-- SweetAlert2 模态框 -->
		<script src="/iframe/script/SweetAlert2/sweetalert2@11.js"></script>
		<!-- 工具库 -->
		<script src="/iframe/script/eext_tool/jszip.min.js"></script>
		<script src="/iframe/script/eext_tool/highlight.min.js"></script>
		<script src="/iframe/script/eext_tool/marked.min.js"></script>
		<!-- 应用逻辑 -->
		<script src="/iframe/script/ext_manifest.js"></script>
		<script src="/iframe/script/eda_coder/EDA_Codes.js"></script>
		<script src="/iframe/script/User_config/Project_Manager.js"></script>
		<script src="/iframe/script/User_config/FileTree_UI.js"></script>
		<script src="/iframe/script/User_config/HTML_Renderer.js"></script>
		<script src="/iframe/script/User_config/Project_Completer.js"></script>
		<script src="/iframe/script/User_config/Left_Nav_Panel.js"></script>
		<script src="/iframe/script/User_config/Keyboard_Config.js"></script>
		<script src="/iframe/script/User_config/Theme_Engine.js"></script>
		<script src="/iframe/script/User_config/Menu_Config.js"></script>
		<script src="/iframe/script/User_config/Ai_Chat.js"></script>
		<script src="/iframe/script/User_config/ACE_Config.js"></script>
		<script src="/iframe/script/User_config/Completer_Store.js"></script>
		<script src="/iframe/script/User_config/Code_Config.js"></script>
		<script src="/iframe/script/User_config/App_Init.js"></script>
	</body>
</html>
