<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>HTML Preview</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		body {
			overflow: hidden;
		}
		iframe {
			width: 100%;
			height: 100vh;
			border: none;
		}
	</style>
</head>
<body>
	<iframe id="preview-frame"></iframe>
	<script>
		(async function() {
			try {
				const htmlContent = await eda.sys_Storage.getExtensionUserConfig('__preview_html');
				if (htmlContent && typeof htmlContent === 'string') {
					const iframe = document.getElementById('preview-frame');
					iframe.srcdoc = htmlContent;
				} else {
					document.body.innerHTML = '<div style="padding:20px;font-family:sans-serif;">No HTML content to preview</div>';
				}
			} catch(e) {
				document.body.innerHTML = '<div style="padding:20px;font-family:sans-serif;color:red;">Error: ' + e.message + '</div>';
			}
		})();
	</script>
</body>
</html>
