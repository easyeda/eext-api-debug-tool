<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #272822;
            color: #f8f8f2;
            overflow: hidden;
            height: 100vh;
        }
        #toolbar {
            height: 48px;
            background: #2d2e27;
            border-bottom: 1px solid #3e3d32;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
        }
        button {
            height: 32px;
            padding: 0 16px;
            background: #272822;
            color: #f8f8f2;
            border: 1px solid #49483e;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #3e3d32;
            border-color: #66d9ef;
            color: #66d9ef;
        }
        select {
            height: 32px;
            padding: 0 12px;
            background: #272822;
            color: #f8f8f2;
            border: 1px solid #49483e;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        #canvas {
            display: block;
            width: 100%;
            height: calc(100vh - 48px);
            cursor: grab;
        }
        #canvas:active {
            cursor: grabbing;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #2d2e27;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 20px;
            width: 500px;
            max-height: 80vh;
            overflow: auto;
        }
        .modal-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 16px;
            color: #66d9ef;
        }
        textarea {
            width: 100%;
            height: 300px;
            background: #272822;
            color: #f8f8f2;
            border: 1px solid #49483e;
            border-radius: 4px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }
        .modal-footer {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        #search-panel {
            display: none;
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            max-height: 500px;
            background: #2d2e27;
            border: 1px solid #444;
            border-radius: 8px;
            z-index: 2000;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }
        #search-panel.show {
            display: flex;
            flex-direction: column;
        }
        .search-results {
            overflow-y: auto;
            max-height: 450px;
        }
        .search-result-item {
            padding: 12px 16px;
            border-bottom: 1px solid #3e3d32;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-result-item:hover {
            background: #3e3d32;
        }
        .search-result-title {
            font-weight: bold;
            color: #66d9ef;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .search-result-path {
            font-size: 11px;
            color: #75715e;
            margin-bottom: 4px;
        }
        .search-result-desc {
            font-size: 12px;
            color: #f8f8f2;
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <button id="zoom-in">放大</button>
        <button id="zoom-out">缩小</button>
        <button id="zoom-reset">重置</button>
        <input type="text" id="search-blocks" placeholder="搜索模块..." style="width: 200px; height: 32px; padding: 0 12px; background: #272822; color: #f8f8f2; border: 1px solid #49483e; border-radius: 6px; font-size: 14px;">
        <select id="add-block">
            <option value="">添加模块...</option>
        </select>
        <button id="run">运行</button>
        <button id="view-code">查看代码</button>
        <button id="export">导出</button>
        <button id="import">导入</button>
        <button id="clear">清空</button>
    </div>
    <canvas id="canvas"></canvas>

    <div id="search-panel">
        <div class="search-results" id="search-results"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="modal-title">编辑自定义代码</div>
            <textarea id="code-editor" placeholder="输入 JavaScript 代码...&#10;可用变量: input (输入值)&#10;返回值将作为输出"></textarea>
            <input type="text" id="variable-editor" placeholder="输入值 (字符串、数字、true/false、null 或 JSON)" style="display:none; width: 100%; height: 40px; background: #272822; color: #f8f8f2; border: 1px solid #49483e; border-radius: 4px; padding: 0 12px; font-family: 'Courier New', monospace; font-size: 13px;">
            <div class="modal-footer">
                <button id="modal-cancel">取消</button>
                <button id="modal-save">保存</button>
            </div>
        </div>
    </div>

    <div id="code-view-modal" class="modal">
        <div class="modal-content" style="width: 700px;">
            <div class="modal-header">生成代码预览</div>
            <textarea id="code-view-editor" readonly style="height: 450px; cursor: text;"></textarea>
            <div class="modal-footer">
                <button id="code-view-copy">复制代码</button>
                <button id="code-view-close">关闭</button>
            </div>
        </div>
    </div>

    <script src="../script/eda_coder/EDA_Codes.js"></script>
    <script src="workflow.js"></script>
</body>
</html>
